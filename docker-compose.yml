services:
  # ─── WuzAPI — WhatsApp Engine (Go + whatsmeow) ───────────────────────────
  wuzapi:
    image: asternic/wuzapi:latest
    container_name: waforge-wuzapi
    restart: unless-stopped
    ports:
      - "3100:8080"
    command: ["-admintoken", "${WUZAPI_TOKEN:-secret-token}", "-logtype", "console"]
    volumes:
      - wuzapi_data:/app/dbdata
    networks:
      - wa-net

  # ─── go-whatsapp-web-multidevice (fallback engine) ───────────────────────
  # Uncomment this service to use gowa instead of/alongside WuzAPI.
  # Set WHATSAPP_ENGINE=gowa in the app environment below.
  gowa:
    image: ghcr.io/aldinokemal/go-whatsapp-web-multidevice:latest
    container_name: waforge-gowa
    restart: unless-stopped
    ports:
      - "3200:3000"
    command:
      - rest
      - --basic-auth=admin:${GOWA_TOKEN:-secret-token}
      - --port=3000
    volumes:
      - gowa_data:/app/storages
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://admin:${GOWA_TOKEN:-secret-token}@localhost:3000/app/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa-net

  # ─── WA Forge  — Nuxt 3 Dashboard (Nitro Engine) ─────────────────────
  # To use the pre-built image from GitHub Container Registry instead of
  # building locally, replace the `build` block with:
  #   image: ghcr.io/darkrei08/waforge:latest
  waforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/darkrei08/waforge:latest
    container_name: waforge-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      - APP_SECRET=${APP_SECRET:-change-me}
      - WHATSAPP_ENGINE=${WHATSAPP_ENGINE:-gowa}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-waforge}?schema=public
      - WUZAPI_URL=${WUZAPI_URL:-http://wuzapi:3100}
      - WUZAPI_TOKEN=${WUZAPI_TOKEN:-secret-token}
      - GOWA_URL=${GOWA_URL:-http://gowa:3000}
      - GOWA_TOKEN=${GOWA_TOKEN:-secret-token}
      - CAMPAIGN_DELAY_MAX=${CAMPAIGN_DELAY_MAX:-45}
      - MAX_MESSAGES_PER_HOUR=${MAX_MESSAGES_PER_HOUR:-100}
      - SPINTAX_ENABLED=${SPINTAX_ENABLED:-true}
      - NUXT_PUBLIC_ENABLE_DEBUG_WIDGET=${ENABLE_DEBUG_WIDGET:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      wuzapi:
        condition: service_started
      gowa:
        condition: service_started
    networks:
      - wa-net
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.waforge.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.waforge.entrypoints=${WEBSECURE_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.waforge.tls.certresolver=${CERT_RESOLVER:-myresolver}"
      - "traefik.http.services.waforge.loadbalancer.server.port=3000"

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: waforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-waforge}
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - wa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: waforge-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - wa-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wuzapi_data:
    driver: local
  gowa_data:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  wa-net:
    driver: bridge
