services:
  # ─── WuzAPI — WhatsApp Engine (Go + whatsmeow) ───────────────────────────
  wuzapi:
    image: asternic/wuzapi:latest
    container_name: wa-sender-wuzapi
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - WUZAPI_USERS=${WUZAPI_TOKEN:-secret-token}
      - WUZAPI_LOGTYPE=console
    volumes:
      - wuzapi_data:/app/dbdata
    networks:
      - wa-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/app/login"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── go-whatsapp-web-multidevice (fallback engine) ───────────────────────
  # Uncomment this service to use gowa instead of/alongside WuzAPI.
  # Set WHATSAPP_ENGINE=gowa in the app environment below.
  # gowa:
  #   image: aldinokemal/go-whatsapp-web-multidevice:latest
  #   container_name: wa-sender-gowa
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GOWA_AUTH_TOKEN=${GOWA_TOKEN:-secret-token}
  #   volumes:
  #     - gowa_data:/app/storages
  #   networks:
  #     - wa-net
  #   healthcheck:
  #     test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/app/login"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ─── WA Sender Pro — Nuxt 3 Dashboard (Nitro Engine) ─────────────────────
  # To use the pre-built image from GitHub Container Registry instead of
  # building locally, replace the `build` block with:
  #   image: ghcr.io/darkrei08/wa-sender-pro:latest
  wa-sender-pro:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/darkrei08/wa-sender-pro:latest
    container_name: wa-sender-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      - APP_SECRET=${APP_SECRET:-change-me}
      - WHATSAPP_ENGINE=${WHATSAPP_ENGINE:-wuzapi}
      - WUZAPI_URL=http://wuzapi:3100
      - WUZAPI_TOKEN=${WUZAPI_TOKEN:-secret-token}
      - GOWA_URL=http://gowa:3000
      - GOWA_TOKEN=${GOWA_TOKEN:-secret-token}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/wasender?schema=public
      - REDIS_URL=redis://redis:6379
      - CAMPAIGN_DELAY_MIN=${CAMPAIGN_DELAY_MIN:-15}
      - CAMPAIGN_DELAY_MAX=${CAMPAIGN_DELAY_MAX:-45}
      - MAX_MESSAGES_PER_HOUR=${MAX_MESSAGES_PER_HOUR:-100}
      - SPINTAX_ENABLED=${SPINTAX_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      wuzapi:
        condition: service_healthy
    networks:
      - wa-net

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: wa-sender-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wasender
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - wa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wa-sender-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - wa-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wuzapi_data:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  wa-net:
    driver: bridge
