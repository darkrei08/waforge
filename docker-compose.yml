services:
  # ─── 1. WaForge Frontend (Astro 5 Landing) ──────────────────────────────────
  waforge-frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: waforge-frontend
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    networks:
      - wa-net
    labels:
      traefik.enable: "${TRAEFIK_ENABLE:-false}"
      traefik.http.routers.waforge-frontend.rule: "Host(`${DOMAIN:-localhost}`) || Host(`www.${DOMAIN:-localhost}`)"
      traefik.http.routers.waforge-frontend.entrypoints: "${WEBSECURE_ENTRYPOINT:-websecure}"
      traefik.http.routers.waforge-frontend.tls.certresolver: "${CERT_RESOLVER:-myresolver}"
      traefik.http.services.waforge-frontend.loadbalancer.server.port: "4321"

  # ─── 2. Microservizio Core (Elysia) ───────────────────────────────────
  api-core:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    container_name: api-core
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${APP_SECRET:-change-me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-waforge}?schema=public
    networks:
      - wa-net
    labels:
      traefik.enable: "${TRAEFIK_ENABLE:-false}"
      traefik.http.routers.api-core.rule: "Host(`api.${DOMAIN:-localhost}`) && PathPrefix(`/core`)"
      traefik.http.routers.api-core.entrypoints: "${WEBSECURE_ENTRYPOINT:-websecure}"
      traefik.http.routers.api-core.tls.certresolver: "${CERT_RESOLVER:-myresolver}"
      traefik.http.services.api-core.loadbalancer.server.port: "3000"
    depends_on:
      db:
        condition: service_healthy

  # ─── WuzAPI — WhatsApp Engine (Go + whatsmeow) ───────────────────────────
  wuzapi:
    image: asternic/wuzapi:latest
    container_name: waforge-wuzapi
    restart: unless-stopped
    ports:
      - "3100:8080"
    expose:
      - "8080"
    command: ["-admintoken", "${WUZAPI_TOKEN:-secret-token}", "-logtype", "console"]
    env_file:
      - .env
    environment:
      WUZAPI_GLOBAL_ENCRYPTION_KEY: ${WUZAPI_GLOBAL_ENCRYPTION_KEY}
      WUZAPI_GLOBAL_HMAC_KEY: ${WUZAPI_GLOBAL_HMAC_KEY}
    volumes:
      - wuzapi_data:/app/dbdata
    networks:
      - wa-net

  # ─── go-whatsapp-web-multidevice (fallback engine) ───────────────────────
  # Uncomment this service to use gowa instead of/alongside WuzAPI.
  # Set WHATSAPP_ENGINE=gowa in the app environment below.
  gowa:
    image: ghcr.io/aldinokemal/go-whatsapp-web-multidevice:latest
    container_name: waforge-gowa
    restart: unless-stopped
    ports:
      - "3200:3000"
    expose:
      - "3000"
    command:
      - rest
      - --basic-auth=admin:${GOWA_TOKEN:-secret-token}
      - --port=3000
      - --webhook=http://waforge-backend:3000/webhook/gowa
      - --webhook-secret=${GOWA_APP_SECRET:-my-secret-key}
    volumes:
      - gowa_data:/app/storages
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://admin:${GOWA_TOKEN:-secret-token}@localhost:3000/app/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa-net

  # ─── OpenWA (Node.js / Baileys engine & Hybrid Companion) ────────────────
  # Set WHATSAPP_ENGINE=openwa or hybrid in the app environment below.
  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    container_name: waforge-openwa
    restart: unless-stopped
    ports:
      - "2785:2785"
    expose:
      - "2785"
    environment:
      PORT: 2785
      API_KEY: ${OPENWA_API_KEY:-owa_k1_secret}
      WEBHOOK_URL: http://waforge-backend:3000/webhook/openwa
    volumes:
      - openwa_data:/app/sessions
    networks:
      - wa-net

  # ─── WA Forge  — Nuxt 3 Dashboard (Nitro Engine) ─────────────────────
  # To use the pre-built image from GitHub Container Registry instead of
  # building locally, replace the `build` block with:
  #   image: ghcr.io/darkrei08/waforge:latest
  waforge:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    image: ghcr.io/darkrei08/waforge:latest
    container_name: waforge-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      # --- App Configuration ---
      NODE_ENV: ${NODE_ENV:-production}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      APP_SECRET: ${APP_SECRET:-change-me}
      NUXT_PUBLIC_ENABLE_DEBUG_WIDGET: ${ENABLE_DEBUG_WIDGET:-true}
      LOG_LEVEL: ${LOG_LEVEL_WAFORGE:-verbose}
      LOG_LEVEL_WAFORGE: ${LOG_LEVEL_WAFORGE:-verbose}
      LOG_LEVEL_WUZAPI: ${LOG_LEVEL_WUZAPI:-info}
      LOG_LEVEL_GOWA: ${LOG_LEVEL_GOWA:-info}
      LOG_LEVEL_OPENWA: ${LOG_LEVEL_OPENWA:-info}
      LOG_LEVEL_COCKPIT: ${LOG_LEVEL_COCKPIT:-info}
      LOG_LEVEL_MCP: ${LOG_LEVEL_MCP:-info}
      CRIKKET_SERVER_URL: http://crikket-server:3000

      # --- Database & Storage (BullMQ + PostgreSQL) ---
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-waforge}?schema=public

      # --- WhatsApp Engine Strategy ---
      # Options: 'wuzapi' | 'gowa' | 'openwa' | 'hybrid' (Multi-Engine Load Balancing & Failover)
      WHATSAPP_ENGINE: ${WHATSAPP_ENGINE:-hybrid}

      # --- WuzAPI Backend (Go / WhatsMeow) ---
      WUZAPI_URL: ${WUZAPI_URL:-http://wuzapi:8080}
      WUZAPI_TOKEN: ${WUZAPI_TOKEN:-secret-token}

      # --- GoWA Backend (aldinokemal / WhatsMeow) ---
      GOWA_URL: ${GOWA_URL:-http://gowa:3000}
      GOWA_TOKEN: ${GOWA_TOKEN:-secret-token}
      GOWA_APP_SECRET: ${GOWA_APP_SECRET:-my-secret-key}

      # --- OpenWA Backend (Node.js / Baileys) ---
      OPENWA_URL: ${OPENWA_URL:-http://openwa:2785/api}
      OPENWA_API_KEY: ${OPENWA_API_KEY:-owa_k1_secret}

      # --- Campaign Defaults, Rate Limiting & Anti-Ban ---
      CAMPAIGN_DELAY_MIN: ${CAMPAIGN_DELAY_MIN:-15}
      CAMPAIGN_DELAY_MAX: ${CAMPAIGN_DELAY_MAX:-45}
      MAX_MESSAGES_PER_HOUR: ${MAX_MESSAGES_PER_HOUR:-100}
      SPINTAX_ENABLED: ${SPINTAX_ENABLED:-true}

      # --- SMTP Notifications ---
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}

      # --- OAuth & pi.dev Cockpit Bridge ---
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_AUTHORIZE_URL: ${OAUTH_AUTHORIZE_URL}
      OAUTH_TOKEN_URL: ${OAUTH_TOKEN_URL}
      OAUTH_USERINFO_URL: ${OAUTH_USERINFO_URL}
      COCKPIT_HOST_URL: http://host.docker.internal:19528
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - waforge_uploads:/app/data/uploads
      - ~/.antigravity_cockpit:/home/nuxtjs/.antigravity_cockpit:ro
      - ~/.pi/account-switcher:/home/nuxtjs/.pi/account-switcher:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      wuzapi:
        condition: service_started
      gowa:
        condition: service_started
      openwa:
        condition: service_started
    networks:
      - wa-net
    labels:
      traefik.enable: "${TRAEFIK_ENABLE:-false}"
      traefik.http.routers.waforge.rule: "Host(`app.${DOMAIN:-localhost}`)"
      traefik.http.routers.waforge.entrypoints: "${WEBSECURE_ENTRYPOINT:-websecure}"
      traefik.http.routers.waforge.tls.certresolver: "${CERT_RESOLVER:-myresolver}"
      traefik.http.services.waforge.loadbalancer.server.port: "3000"

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: waforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-waforge}
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - wa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: waforge-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - wa-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MCP Agent Starter ──────────────────────────────────────────────────────
  mcp-agent:
    # build:
    #   context: nuxt-mcp-agent-starter
    #   dockerfile: Dockerfile
    image: ghcr.io/darkrei08/nuxt-mcp-agent-starter:latest
    container_name: waforge-mcp-agent
    restart: unless-stopped
    ports:
      - "3002:3000"
    expose:
      - "3000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL_MCP:-info}
    networks:
      - wa-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Cockpit Agent Starter ──────────────────────────────────────────────────
  cockpit-agent:
    # build:
    #   context: nuxt-cockpit-agent-starter
    #   dockerfile: Dockerfile
    image: ghcr.io/darkrei08/nuxt-cockpit-agent-starter:latest
    container_name: waforge-cockpit-agent
    restart: unless-stopped
    ports:
      - "3003:3000"
    expose:
      - "3000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL_COCKPIT:-info}
    networks:
      - wa-net
    volumes:
      - ~/.antigravity_cockpit:/home/nuxtjs/.antigravity_cockpit:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ============================================================================
  # ─── Crikket Bug Reporting Stack (Automated Error Tracker for AI & Devs) ──
  # ============================================================================

  # ─── 1. Crikket Database (Isolated PostgreSQL Instance on Host Port 5434) ──
  crikket-postgres:
    image: postgres:17-alpine
    container_name: crikket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CRIKKET_POSTGRES_USER:-crikket}
      POSTGRES_PASSWORD: ${CRIKKET_POSTGRES_PASSWORD:-crikket_secret}
      POSTGRES_DB: ${CRIKKET_POSTGRES_DB:-crikket}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${CRIKKET_POSTGRES_PORT:-5434}:5432"
    expose:
      - "5432"
    volumes:
      - crikket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRIKKET_POSTGRES_USER:-crikket} -d ${CRIKKET_POSTGRES_DB:-crikket}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wa-net

  # ─── 2. Crikket DB Migrations (One-shot schema setup job) ─────────────────
  crikket-migrate:
    image: ghcr.io/redpangilinan/crikket-server:latest
    container_name: crikket-migrate
    restart: "no"
    pull_policy: always
    depends_on:
      crikket-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${CRIKKET_POSTGRES_USER:-crikket}:${CRIKKET_POSTGRES_PASSWORD:-crikket_secret}@crikket-postgres:5432/${CRIKKET_POSTGRES_DB:-crikket}"
      NODE_ENV: development
      STORAGE_BUCKET: "${CRIKKET_STORAGE_BUCKET:-mock-bucket}"
      STORAGE_ACCESS_KEY_ID: "${CRIKKET_STORAGE_ACCESS_KEY_ID:-mock-key}"
      STORAGE_SECRET_ACCESS_KEY: "${CRIKKET_STORAGE_SECRET_ACCESS_KEY:-mock-secret}"
      STORAGE_ENDPOINT: "${CRIKKET_STORAGE_ENDPOINT:-http://localhost:9000}"
    command: ["bun", "run", "--filter", "@crikket/db", "db:migrate"]
    networks:
      - wa-net

  # ─── 3. Crikket Server API (Backend Service on Host Port 3150) ────────────
  crikket-server:
    image: ghcr.io/redpangilinan/crikket-server:latest
    container_name: crikket-server
    restart: unless-stopped
    pull_policy: always
    depends_on:
      crikket-postgres:
        condition: service_healthy
      crikket-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://${CRIKKET_POSTGRES_USER:-crikket}:${CRIKKET_POSTGRES_PASSWORD:-crikket_secret}@crikket-postgres:5432/${CRIKKET_POSTGRES_DB:-crikket}"
      NODE_ENV: development
      PORT: 3000
      PUBLIC_SERVER_URL: ${CRIKKET_PUBLIC_SERVER_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3150}}
      PUBLIC_WEB_URL: ${CRIKKET_PUBLIC_WEB_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3151}}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-crikket_super_secret_key_change_me}
      BETTER_AUTH_URL: ${CRIKKET_PUBLIC_SERVER_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3150}}
      BETTER_AUTH_TRUSTED_ORIGINS: "http://localhost:3151,http://127.0.0.1:3151,http://192.168.87.223:3151,${CRIKKET_PUBLIC_WEB_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3151}},${NUXT_PUBLIC_APP_URL:-http://localhost:3000},${CRIKKET_CORS_ORIGINS:-}"
      CORS_ORIGINS: "http://localhost:3151,http://127.0.0.1:3151,http://192.168.87.223:3151,${CRIKKET_PUBLIC_WEB_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3151}},${NUXT_PUBLIC_APP_URL:-http://localhost:3000},${CRIKKET_CORS_ORIGINS:-}"
      ENABLE_PAYMENTS: "false"
      STORAGE_BUCKET: "${CRIKKET_STORAGE_BUCKET:-mock-bucket}"
      STORAGE_ACCESS_KEY_ID: "${CRIKKET_STORAGE_ACCESS_KEY_ID:-mock-key}"
      STORAGE_SECRET_ACCESS_KEY: "${CRIKKET_STORAGE_SECRET_ACCESS_KEY:-mock-secret}"
      STORAGE_ENDPOINT: "${CRIKKET_STORAGE_ENDPOINT:-http://localhost:9000}"
    ports:
      - "${CRIKKET_SERVER_PORT:-3150}:3000"
    expose:
      - "3000"
    networks:
      - wa-net
    labels:
      traefik.enable: "${TRAEFIK_ENABLE:-false}"
      traefik.http.routers.crikket-api.rule: "(Host(`${CRIKKET_DOMAIN:-crikket.localhost}`) && (PathPrefix(`/api`) || PathPrefix(`/better-auth`) || PathPrefix(`/trpc`) || PathPrefix(`/storage`) || PathPrefix(`/oauth`))) || Host(`${CRIKKET_API_DOMAIN:-crikket-api.localhost}`)"
      traefik.http.routers.crikket-api.priority: "20"
      traefik.http.routers.crikket-api.entrypoints: "${WEBSECURE_ENTRYPOINT:-websecure}"
      traefik.http.routers.crikket-api.tls.certresolver: "${CERT_RESOLVER:-myresolver}"
      traefik.http.services.crikket-api.loadbalancer.server.port: "3000"

  # ─── 4. Crikket Web Dashboard (Frontend UI on Host Port 3151) ─────────────
  crikket-web:
    image: ghcr.io/redpangilinan/crikket-web:latest
    container_name: crikket-web
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - crikket-server
    environment:
      NEXT_PUBLIC_SERVER_URL: ${CRIKKET_PUBLIC_SERVER_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3150}}
      NEXT_PUBLIC_APP_URL: ${CRIKKET_PUBLIC_WEB_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3151}}
      NEXT_PUBLIC_SITE_URL: ${CRIKKET_PUBLIC_WEB_URL:-${CRIKKET_PUBLIC_URL:-http://localhost:3151}}
      PORT: 3151
    ports:
      - "${CRIKKET_WEB_PORT:-3151}:3151"
    expose:
      - "3151"
    command:
      - "/bin/sh"
      - "-c"
      - |
        bun -e '
        Bun.listen({
          port: 3150,
          hostname: "0.0.0.0",
          socket: {
            async open(client) {
              client.buf = [];
              try {
                const remote = await Bun.connect({
                  hostname: "crikket-server",
                  port: 3000,
                  socket: {
                    data(s, d) { client.write(d); },
                    close() { client.end(); },
                    error() { client.end(); }
                  }
                });
                client.data = remote;
                for (const chunk of client.buf) {
                  remote.write(chunk);
                }
                client.buf = null;
              } catch(e) { client.end(); }
            },
            data(client, d) { if (client.data) client.data.write(d); else if (client.buf) client.buf.push(d); },
            close(client) { if (client.data) client.data.end(); },
            error(client) { if (client.data) client.data.end(); }
          }
        });
        ' &
        exec bun run --cwd apps/web start -- --port 3151 --hostname 0.0.0.0
    networks:
      - wa-net
    labels:
      traefik.enable: "${TRAEFIK_ENABLE:-false}"
      traefik.http.routers.crikket-web.rule: "Host(`${CRIKKET_DOMAIN:-crikket.localhost}`) || Host(`${CRIKKET_WEB_DOMAIN:-crikket.localhost}`)"
      traefik.http.routers.crikket-web.priority: "10"
      traefik.http.routers.crikket-web.entrypoints: "${WEBSECURE_ENTRYPOINT:-websecure}"
      traefik.http.routers.crikket-web.tls.certresolver: "${CERT_RESOLVER:-myresolver}"
      traefik.http.services.crikket-web.loadbalancer.server.port: "3151"

volumes:
  crikket_postgres_data:
    driver: local
  wuzapi_data:
    driver: local
  gowa_data:
    driver: local
  openwa_data:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local
  waforge_uploads:
    driver: local

networks:
  wa-net:
    driver: bridge
